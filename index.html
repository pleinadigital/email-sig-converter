<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlook Signature Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e11; --surface: #16161a; --surface2: #1e1e24; --border: #2a2a35;
    --accent: #5b6af0; --accent2: #a78bfa; --green: #34d399;
    --yellow: #fbbf24; --text: #e2e2ef; --muted: #6b6b80;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  header { padding:16px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; flex-shrink:0; }
  .logo { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; font-weight:600; color:#fff; }
  header h1 { font-size:14px; font-weight:500; letter-spacing:0.02em; }
  .version { margin-left:auto; font-size:11px; color:var(--muted); font-family:var(--mono); background:var(--surface2); border:1px solid var(--border); padding:3px 9px; border-radius:4px; }

  /* Shared preview shell styles */
  .preview-wrap { flex:1; overflow-y:auto; padding:18px; }
  .preview-wrap.outlook-bg { background:#f0f0f0; }
  .preview-wrap.gmail-bg   { background:#f6f8fc; }
  .preview-card { background:#fff; border-radius:8px; box-shadow:0 2px 10px rgba(0,0,0,.12); overflow:hidden; font-family:Arial,sans-serif; }

  /* Outlook shell */
  .ol-tbar { background:#1a3a6b; padding:8px 14px; display:flex; gap:6px; align-items:center; }
  .ol-tbar-label { color:#fff; font-size:11px; font-family:Arial; opacity:.8; }
  .ol-field { padding:7px 14px; border-bottom:1px solid #e8e8e8; font-size:12px; color:#555; font-family:Arial; display:flex; gap:8px; }
  .ol-field span { color:#999; }
  .ol-body { padding:14px 18px; min-height:60px; font-size:13px; color:#333; line-height:1.5; border-bottom:1px solid #f0f0f0; font-family:Arial; }
  .ol-body p { margin-bottom:6px; color:#555; }
  .ol-sig { padding:10px 18px 16px; border-top:2px solid #e8e8e8; }

  /* Gmail shell */
  .gmail-tbar { background:#f1f3f4; padding:7px 12px; display:flex; gap:5px; align-items:center; border-bottom:1px solid #e0e0e0; }
  .gtb { width:26px; height:26px; border-radius:4px; border:none; background:transparent; cursor:default; font-size:12px; color:#555; display:flex; align-items:center; justify-content:center; }
  .gdiv { width:1px; height:18px; background:#ccc; margin:0 2px; }
  .gmail-body { padding:14px 18px; min-height:70px; font-size:13px; color:#333; line-height:1.5; border-bottom:1px solid #f0f0f0; }
  .gmail-body p { margin-bottom:6px; color:#555; }
  .gmail-sig { padding:10px 18px 16px; border-top:2px solid #e8eaed; }

  .workspace { flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr auto auto; overflow:hidden; }

  .panel { display:flex; flex-direction:column; overflow:hidden; }
  .input-panel { border-right:1px solid var(--border); background:var(--surface); }
  .output-panel { background:var(--surface2); }

  .panel-bar { padding:11px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--surface); flex-shrink:0; }
  .bar-left { display:flex; align-items:center; gap:8px; }
  .dot { width:7px; height:7px; border-radius:50%; }
  .dot-y { background:var(--yellow); }
  .bar-label { font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); font-family:var(--mono); }
  .bar-actions { display:flex; gap:6px; }

  .btn { font-family:var(--mono); font-size:11px; font-weight:500; padding:5px 11px; border-radius:5px; border:none; cursor:pointer; transition:all .15s; letter-spacing:0.03em; }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
  .btn-green { background:transparent; border:1px solid var(--green); color:var(--green); }
  .btn-green:hover { background:var(--green); color:var(--bg); }
  .btn-blue { background:transparent; border:1px solid #60a5fa; color:#60a5fa; }
  .btn-blue:hover { background:#60a5fa; color:var(--bg); }

  textarea { flex:1; padding:16px; font-family:var(--mono); font-size:12px; line-height:1.7; border:none; outline:none; resize:none; background:var(--surface); color:var(--text); overflow-y:auto; }
  textarea::placeholder { color:var(--muted); }

  .tabs { display:flex; align-items:center; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .tab { padding:10px 18px; font-family:var(--mono); font-size:11px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; color:var(--muted); transition:all .15s; display:flex; align-items:center; gap:6px; user-select:none; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-spacer { flex:1; }
  .tab-btn-wrap { padding-right:12px; }

  .pane { display:none; flex:1; flex-direction:column; overflow:hidden; }
  .pane.active { display:flex; }

  .code-out { flex:1; padding:16px; font-family:var(--mono); font-size:12px; line-height:1.7; background:var(--surface2); color:#a5f3c0; white-space:pre-wrap; word-break:break-all; overflow-y:auto; user-select:all; cursor:text; }

  .sig-lbl { font-size:10px; color:#aaa; font-family:Arial; margin-bottom:8px; text-transform:uppercase; letter-spacing:.05em; }

  /* The copyable rendered signature */
  .sig-rendered {
    display:inline-block;
    cursor:default;
    outline:2px dashed transparent;
    border-radius:4px;
    transition: outline-color .2s;
  }
  .sig-rendered.highlighted { outline-color: #60a5fa; }

  .copy-hint {
    font-size:11px; color:#aaa; font-family:Arial; margin-top:10px;
    padding:6px 10px; background:#f1f3f4; border-radius:4px; display:none;
    line-height:1.5;
  }
  .copy-hint.show { display:block; }

  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); font-family:var(--mono); font-size:12px; }
  .empty-icon { font-size:26px; opacity:.35; }

  .action-bar { grid-column:1/-1; padding:13px 20px; background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .go-btn { font-family:var(--mono); font-size:13px; font-weight:600; padding:9px 26px; border-radius:6px; border:none; cursor:pointer; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; transition:all .2s; letter-spacing:.05em; }
  .go-btn:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 4px 20px rgba(91,106,240,.4); }
  .go-btn:active { transform:none; }
  .badge { font-family:var(--mono); font-size:11px; padding:4px 10px; border-radius:4px; display:none; }
  .badge.show { display:inline-flex; align-items:center; gap:5px; background:rgba(52,211,153,.15); border:1px solid rgba(52,211,153,.4); color:var(--green); }
  .status { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--muted); }

  .issues-wrap { grid-column:1/-1; border-top:1px solid var(--border); max-height:0; overflow:hidden; transition:max-height .3s; background:var(--bg); flex-shrink:0; }
  .issues-wrap.open { max-height:150px; overflow-y:auto; }
  .issues-head { padding:9px 20px 0; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-family:var(--mono); }
  .issues-list { padding:9px 20px 12px; display:flex; flex-wrap:wrap; gap:6px; }
  .itag { font-family:var(--mono); font-size:11px; padding:3px 9px; border-radius:4px; display:flex; align-items:center; gap:5px; }
  .itag.fixed { background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.3); color:var(--green); }
  .itag.info { background:rgba(167,139,250,.1); border:1px solid rgba(167,139,250,.3); color:var(--accent2); }

  .flash { position:fixed; bottom:68px; left:50%; transform:translateX(-50%) translateY(8px); background:var(--green); color:var(--bg); font-family:var(--mono); font-size:12px; font-weight:600; padding:7px 18px; border-radius:6px; opacity:0; transition:all .2s; pointer-events:none; z-index:100; white-space:nowrap; max-width:90vw; text-align:center; }
  .flash.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">OL</div>
  <h1>Outlook Signature Converter</h1>
  <span class="version">v3 — Outlook &amp; Gmail preview</span>
</header>

<div class="workspace">

  <!-- INPUT -->
  <div class="panel input-panel">
    <div class="panel-bar">
      <div class="bar-left"><div class="dot dot-y"></div><span class="bar-label">Input HTML</span></div>
      <div class="bar-actions">
        <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
        <button class="btn btn-ghost" onclick="doPaste()">Paste</button>
      </div>
    </div>
    <textarea id="inputHTML" placeholder="Paste your email signature HTML here..."></textarea>
  </div>

  <!-- OUTPUT -->
  <div class="panel output-panel">
    <div class="tabs">
      <div class="tab active" id="tab-outlook" onclick="switchTab('outlook')">📧 Outlook Preview</div>
      <div class="tab" id="tab-gmail" onclick="switchTab('gmail')">✉️ Gmail Preview</div>
      <div class="tab" id="tab-code" onclick="switchTab('code')">🔧 HubSpot Code</div>
      <div class="tab-spacer"></div>
      <div class="tab-btn-wrap" id="tbtn-outlook"><button class="btn btn-green" onclick="copyRendered('outlook')">Copy for Outlook</button></div>
      <div class="tab-btn-wrap" id="tbtn-gmail" style="display:none"><button class="btn btn-green" onclick="copyRendered('gmail')">Copy for Gmail</button></div>
      <div class="tab-btn-wrap" id="tbtn-code" style="display:none"><button class="btn btn-green" onclick="copyRawCode()">Copy for HubSpot</button></div>
    </div>

    <!-- Outlook preview pane -->
    <div class="pane active" id="pane-outlook">
      <div class="preview-wrap outlook-bg" id="outlookWrap">
        <div class="empty-state"><div class="empty-icon">📧</div><div>Outlook preview appears after converting</div></div>
      </div>
    </div>

    <!-- Gmail preview pane -->
    <div class="pane" id="pane-gmail">
      <div class="preview-wrap gmail-bg" id="gmailWrap">
        <div class="empty-state"><div class="empty-icon">✉️</div><div>Gmail preview appears after converting</div></div>
      </div>
    </div>

    <!-- Raw code pane -->
    <div class="pane" id="pane-code">
      <div id="codeOut"><div class="empty-state"><div class="empty-icon">⟶</div><div>HubSpot-ready code appears here</div></div></div>
    </div>
  </div>

  <!-- ISSUES -->
  <div class="issues-wrap" id="issuesWrap">
    <div class="issues-head">Fixes Applied</div>
    <div class="issues-list" id="issuesList"></div>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <button class="go-btn" onclick="run()">Convert →</button>
    <div class="badge" id="badge"></div>
    <span class="status" id="status">Paste your signature HTML and click Convert</span>
  </div>
</div>

<div class="flash" id="flash"></div>

<script>
  let converted = '';

  function switchTab(name) {
    ['outlook','gmail','code'].forEach(n => {
      document.getElementById('tab-'  + n).classList.toggle('active', n === name);
      document.getElementById('pane-' + n).classList.toggle('active', n === name);
      document.getElementById('tbtn-' + n).style.display = n === name ? 'block' : 'none';
    });
  }

  function run() {
    const input = document.getElementById('inputHTML').value.trim();
    if (!input) { document.getElementById('status').textContent = 'Please paste HTML first.'; return; }

    const fixes = [];
    let h = input;

    function applyFix(label, fn, type) {
      const before = h;
      h = fn(h);
      if (h !== before) fixes.push({ type: type || 'fixed', label });
    }

    applyFix('-webkit-baseline-middle → middle',   s => s.replace(/vertical-align:\s*-webkit-baseline-middle/g, 'vertical-align: middle'));
    applyFix('border-radius removed',              s => s.replace(/;\s*border-radius\s*:\s*[^;"]+/g,'').replace(/border-radius\s*:\s*[^;"]+;?\s*/g,''));
    applyFix('rem → px',                           s => s.replace(/(\d+(?:\.\d+)?)rem/g, (_,n) => Math.round(parseFloat(n)*16)+'px'));
    applyFix('loading="lazy" removed',            s => s.replace(/\s*loading="lazy"/g,''));
    applyFix('background-image removed',          s => s.replace(/;\s*background-image\s*:\s*[^;"]+/g,'').replace(/background-image\s*:\s*[^;"]+;?\s*/g,''));
    applyFix('max-width removed',                  s => s.replace(/;\s*max-width\s*:\s*\d+px/g,'').replace(/max-width\s*:\s*\d+px;?\s*/g,''));
    applyFix('display:block removed from <td>',    s => s.replace(/(<td[^>]*style="[^"]*?);\s*display\s*:\s*block([^"]*")/gi,'$1$2').replace(/(<td[^>]*style=")display\s*:\s*block;?\s*([^"]*")/gi,'$1$2'));
    applyFix('rgb() → hex',                        s => s.replace(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/g, (_,r,g,b)=>'#'+[r,g,b].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('')));
    applyFix('Protocol-relative URLs → https://',  s => s.replace(/href="\/\//g,'href="https://'));
    applyFix('aria-label removed',                 s => s.replace(/\s*aria-label="[^"]*"/g,''), 'info');
    applyFix('role="presentation" removed',        s => s.replace(/\s*role="presentation"/g,''), 'info');

    h = h.replace(/style="\s*"/g,'').replace(/style=";\s*/g,'style="');
    converted = h;

    // ── Outlook preview pane ──
    document.getElementById('outlookWrap').innerHTML = `
      <div class="preview-card">
        <div class="ol-tbar"><span class="ol-tbar-label">New Message — Outlook</span></div>
        <div class="ol-field"><span>To:</span> recipient@example.com</div>
        <div class="ol-field"><span>Subject:</span> Following up</div>
        <div class="ol-body">
          <p>Hi [Name],</p>
          <p>Hope you're doing well. Just following up on our last conversation...</p>
          <p>&nbsp;</p>
          <p>Best,</p>
        </div>
        <div class="ol-sig">
          <div class="sig-lbl">— Signature — click "Copy for Outlook" then paste into Outlook signature settings</div>
          <span class="sig-rendered" id="sigOutlook">${h}</span>
          <div class="copy-hint" id="hintOutlook">
            ✅ Copied as rich text.<br>
            In Outlook: File → Options → Mail → Signatures → New/Edit → paste with <strong>Ctrl+V</strong>.
          </div>
        </div>
      </div>`;

    // ── Gmail preview pane ──
    document.getElementById('gmailWrap').innerHTML = `
      <div class="preview-card">
        <div class="gmail-tbar">
          <button class="gtb"><b>B</b></button><button class="gtb"><i>I</i></button><button class="gtb"><u>U</u></button>
          <div class="gdiv"></div>
          <button class="gtb">≡</button><button class="gtb">≡</button>
          <div class="gdiv"></div>
          <button class="gtb">🔗</button><button class="gtb">📷</button>
        </div>
        <div class="gmail-body">
          <p>Hi [Name],</p>
          <p>Hope you're doing well. Just following up on our last conversation...</p>
          <p>&nbsp;</p>
          <p>Best,</p>
        </div>
        <div class="gmail-sig">
          <div class="sig-lbl">— Signature — click "Copy for Gmail" then paste into Gmail Settings</div>
          <span class="sig-rendered" id="sigGmail">${h}</span>
          <div class="copy-hint" id="hintGmail">
            ✅ Copied as rich text.<br>
            Open Gmail → Settings (⚙) → See all settings → Signature → paste with <strong>Ctrl+V</strong> (or ⌘V on Mac).
          </div>
        </div>
      </div>`;

    // ── Raw code pane ──
    const codeOut = document.getElementById('codeOut');
    codeOut.innerHTML = '';
    const pre = document.createElement('pre');
    pre.className = 'code-out';
    pre.textContent = h.replace(/></g,'>\n<').replace(/\n\n+/g,'\n').trim();
    codeOut.appendChild(pre);

    // Fixes panel
    document.getElementById('issuesList').innerHTML = fixes.map(f =>
      `<span class="itag ${f.type}">${f.type==='fixed'?'✓':'ℹ'} ${f.label}</span>`).join('');
    document.getElementById('issuesWrap').classList.toggle('open', fixes.length > 0);

    const badge = document.getElementById('badge');
    badge.textContent = `${fixes.length} fix${fixes.length!==1?'es':''} applied`;
    badge.className = 'badge show';
    document.getElementById('status').textContent = `Converted — ${fixes.length} transformations applied`;
  }

  async function copyRendered(target) {
    const sigEl = document.getElementById(target === 'outlook' ? 'sigOutlook' : 'sigGmail');
    const hintEl = document.getElementById(target === 'outlook' ? 'hintOutlook' : 'hintGmail');
    if (!sigEl) { showFlash('Convert first!'); return; }

    const range = document.createRange();
    range.selectNodeContents(sigEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    sigEl.classList.add('highlighted');
    setTimeout(() => sigEl.classList.remove('highlighted'), 1500);

    let success = false;
    try { success = document.execCommand('copy'); } catch(e) {}

    if (!success) {
      try {
        await navigator.clipboard.write([new ClipboardItem({
          'text/html':  new Blob([sigEl.innerHTML], { type: 'text/html' }),
          'text/plain': new Blob([sigEl.innerText], { type: 'text/plain' })
        })]);
        success = true;
      } catch(e) {}
    }

    sel.removeAllRanges();
    if (hintEl) hintEl.classList.add('show');

    const dest = target === 'outlook'
      ? 'Outlook → File → Options → Mail → Signatures'
      : 'Gmail → Settings → Signature';
    showFlash(success ? `✓ Copied! Paste into ${dest}` : 'Select the signature manually and copy with Ctrl+C');
  }

  async function copyRawCode() {
    const pre = document.querySelector('.code-out');
    if (!pre) return;
    try { await navigator.clipboard.writeText(pre.textContent); } catch {}
    showFlash('HubSpot HTML copied!');
  }

  function clearAll() {
    document.getElementById('inputHTML').value = '';
    converted = '';
    document.getElementById('outlookWrap').innerHTML = `<div class="empty-state"><div class="empty-icon">📧</div><div>Outlook preview appears after converting</div></div>`;
    document.getElementById('gmailWrap').innerHTML   = `<div class="empty-state"><div class="empty-icon">✉️</div><div>Gmail preview appears after converting</div></div>`;
    document.getElementById('codeOut').innerHTML     = `<div class="empty-state"><div class="empty-icon">⟶</div><div>HubSpot-ready code appears here</div></div>`;
    document.getElementById('issuesWrap').classList.remove('open');
    document.getElementById('badge').classList.remove('show');
    document.getElementById('status').textContent = 'Paste your signature HTML and click Convert';
  }

  async function doPaste() {
    try { document.getElementById('inputHTML').value = await navigator.clipboard.readText(); }
    catch { document.getElementById('inputHTML').focus(); }
  }

  function showFlash(msg) {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  document.getElementById('inputHTML').addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = e.target.selectionStart;
      e.target.value = e.target.value.substring(0,s) + '  ' + e.target.value.substring(e.target.selectionEnd);
      e.target.selectionStart = e.target.selectionEnd = s + 2;
    }
  });
</script>
</body>
</html>
